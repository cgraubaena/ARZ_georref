
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Arzobispado | Mapas PBA y CABA</title>
  <style>
    :root {
      --bg: #1a1d23;
      --panel: #252a33;
      --text: #e8eaed;
      --muted: #9aa0a6;
      --accent: #c9a227;
      --border: #3c424c;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      font-family: system-ui, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.75rem 1.5rem;
      padding: 0.65rem 1rem;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
    }
    h1 {
      margin: 0;
      font-size: 1.05rem;
      font-weight: 600;
    }
    .tabs {
      display: flex;
      gap: 0.35rem;
      flex-wrap: wrap;
    }
    .tabs button {
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      padding: 0.45rem 0.9rem;
      border-radius: 6px;
      font-size: 0.9rem;
    }
    .tabs button:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .tabs button[aria-selected="true"] {
      background: var(--accent);
      color: #1a1d23;
      border-color: var(--accent);
      font-weight: 600;
    }
    .links {
      margin-left: auto;
      display: flex;
      gap: 0.75rem;
      font-size: 0.82rem;
    }
    .links a {
      color: var(--muted);
    }
    .links a:hover {
      color: var(--accent);
    }
    .frame-wrap {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    iframe {
      flex: 1;
      width: 100%;
      border: 0;
      min-height: calc(100vh - 56px);
      background: #fff;
    }
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
  </style>
</head>
<body>
  <header>
    <h1>Mapas · Provincia de Buenos Aires y CABA</h1>
    <div class="tabs" role="tablist" aria-label="Tipo de mapa">
      <button type="button" role="tab" id="tab-fuente" aria-selected="true" aria-controls="map-frame" data-src="mapa_fuentes.html">Fuentes disponibles</button>
      <button type="button" role="tab" id="tab-uso" aria-selected="false" aria-controls="map-frame" data-src="mapa_uso.html">Tipo de uso</button>
    </div>
    <div class="links">
      <a id="link-open" href="mapa_fuentes.html" target="_blank" rel="noopener">Abrir en pestaña nueva</a>
    </div>
  </header>
  <div class="frame-wrap">
    <iframe id="map-frame" title="Mapa interactivo" src="mapa_fuentes.html"></iframe>
  </div>
  <script>
    (function () {
      var iframe = document.getElementById("map-frame");
      var tabs = document.querySelectorAll(".tabs button[role='tab']");
      var openLink = document.getElementById("link-open");

      function selectTab(active) {
        tabs.forEach(function (btn) {
          var on = btn === active;
          btn.setAttribute("aria-selected", on ? "true" : "false");
        });
        var src = active.getAttribute("data-src");
        iframe.setAttribute("src", src);
        openLink.setAttribute("href", src);
      }

      tabs.forEach(function (btn) {
        btn.addEventListener("click", function () {
          selectTab(btn);
        });
      });
    })();
  </script>
</body>
</html>
